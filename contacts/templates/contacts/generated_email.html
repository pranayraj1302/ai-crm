{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">AI Generated Email</h2>
        <a href="/{{ contact.id }}/" class="text-gray-500 hover:text-black">
            ← Back
        </a>
    </div>

    <!-- Email Card -->
    <div class="bg-white p-6 rounded-xl shadow border">

        <p class="text-sm text-gray-500 mb-3">
            Generated for <strong>{{ contact.name }}</strong>
        </p>

        <pre id="emailContent"
             class="whitespace-pre-wrap text-sm leading-relaxed">
{{ email_content }}
        </pre>

    </div>

    <!-- Actions -->
    <div class="mt-4 flex gap-3">

        <button onclick="copyEmail()"
                class="bg-black text-white px-5 py-2 rounded hover:bg-gray-800">
            Copy Email
        </button>

        <button onclick="copyEmail()"
                class="border px-5 py-2 rounded hover:bg-gray-100">
            Copy & Use
        </button>

    </div>

</div>

<script>
function copyEmail() {
    const text = document.getElementById("emailContent").innerText;
    navigator.clipboard.writeText(text);

    alert("Email copied to clipboard!");
}
</script>

{% endblock %}
