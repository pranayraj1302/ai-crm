{% extends "base.html" %}

{% block content %}

<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Contacts</h2>

        <a href="/add/"
           class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
           + Add Contact
        </a>
    </div>

    <!-- Search Bar -->
    <div class="mb-6">
        <input type="text" placeholder="Search contacts..."
               class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Contacts Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

        {% for contact in contacts %}
            <div class="bg-white p-5 rounded-xl shadow hover:shadow-lg transition">

                <!-- Name -->
                <h3 class="text-lg font-bold">{{ contact.name }}</h3>

                <!-- Email -->
                <p class="text-gray-500 text-sm mt-1">
                    {{ contact.email|default:"No email" }}
                </p>

                <!-- Company -->
                <p class="mt-2 text-sm text-gray-600">
                    {{ contact.company|default:"No company" }}
                </p>

                <!-- Action -->
                <div class="mt-4 flex justify-between items-center">
                    <a href="/{{ contact.id }}/"
                       class="text-blue-500 text-sm font-medium hover:underline">
                       View Details →
                    </a>
                </div>

            </div>
        {% empty %}

            <!-- Empty State -->
            <div class="col-span-3 text-center text-gray-500">
                No contacts yet. Start by adding one.
            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
