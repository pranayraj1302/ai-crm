{% extends "base.html" %}

{% block content %}

<div class="max-w-xl mx-auto">

    <h2 class="text-2xl font-bold mb-6">Add New Contact</h2>

    <div class="bg-white p-6 rounded-xl shadow">

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium mb-1">Name</label>
                <input type="text" name="name" required
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email"
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Phone</label>
                <input type="text" name="phone"
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Company</label>
                <input type="text" name="company"
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Notes</label>
                <textarea name="notes" rows="3"
                          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="flex justify-between items-center pt-4">
                <a href="/" class="text-gray-500 hover:text-black">← Back</a>

                <button type="submit"
                        class="bg-blue-500 text-white px-5 py-2 rounded hover:bg-blue-600">
                    Save Contact
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
