{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center min-h-screen bg-gray-100">

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow">

        <h2 class="text-2xl font-bold text-center mb-6">
            Login to Abide AI CRM
        </h2>

        {% if form.errors %}
            <p class="text-red-500 text-sm mb-4 text-center">
                Invalid username or password
            </p>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" name="username"
                       class="w-full border px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" name="password"
                       class="w-full border px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>

            <button type="submit"
                    class="w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
                Login
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Admin access only
        </p>

    </div>

</div>

{% endblock %}
